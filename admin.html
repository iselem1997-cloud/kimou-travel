<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Kimou Travel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3d59;
            --secondary: #ff6e40;
            --bg-body: #eceff1;
            --white: #ffffff;
            --text-muted: #607d8b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background-color: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon-wrapper {
            font-size: 50px;
            color: var(--secondary);
            margin-bottom: 20px;
        }
        h2 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #cfd8dc;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 110, 64, 0.1);
        }
        .btn-submit {
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #e2582b;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="icon-wrapper">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2>Connexion Admin</h2>
        <p class="subtitle">Accès strictement réservé à la direction de Kimou Travel</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="admin_kimou" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Mot de Passe</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">Se Connecter <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
        </form>
        
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Retourner au site public</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // تحقق بسيط جداً محلي (لأغراض العرض والتجربة قبل ربطه بقاعدة البيانات)
       const correctPassword = localStorage.getItem('kimou_admin_pass') || 'kimou2026';

if (username === "admin_kimou" && password === correctPassword) {
    alert('تم تسجيل الدخول بنجاح!');
    window.location.href = 'dashboard.html';
} else {
    alert('⚠️ اسم المستخدم أو كلمة المرور غير صحيحة!');
};
    </script>
</body>
</html>
