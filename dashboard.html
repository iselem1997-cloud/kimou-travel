<div class="workspace-section" style="padding: 20px; background: #f9f9f9; border-radius: 8px; margin: 20px;">
    <h3>Ajouter une nouvelle offre (إضافة عرض رحلة جديد)</h3>
    <form id="tripForm" style="display: flex; flex-direction: column; gap: 10px; max-width: 500px;">
        <input type="text" id="tripTitle" placeholder="Titre du voyage (عنوان الرحلة)" required style="padding: 10px;">
        <input type="text" id="tripPrice" placeholder="Prix (السعر مثلاً: 45000 DA)" required style="padding: 10px;">
        <input type="text" id="tripImage" placeholder="Lien de l'image (رابط صورة الرحلة)" required style="padding: 10px;">
        <textarea id="tripDesc" placeholder="Description (وصف الرحلة ومميزاتها)" required style="padding: 10px; height: 100px;"></textarea>
        <button type="submit" style="background: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Publier l'offre (نشر العرض)</button>
    </form>
</div>

<script>
document.getElementById('tripForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // جلب القيم من المدخلات
    const title = document.getElementById('tripTitle').value;
    const price = document.getElementById('tripPrice').value;
    const image = document.getElementById('tripImage').value;
    const desc = document.getElementById('tripDesc').value;
    
    // إنشاء كائن الرحلة
    const newTrip = { title, price, image, desc };
    
    // جلب الرحلات القديمة أو إنشاء مصفوفة جديدة
    let trips = JSON.parse(localStorage.getItem('kimou_trips')) || [];
    trips.push(newTrip);
    
    // حفظ في LocalStorage
    localStorage.setItem('kimou_trips', JSON.stringify(trips));
    
    alert('Offre ajoutée avec succès ! تم إضافة العرض بنجاح وسيظهر في الموقع الرئيسي');
    document.getElementById('tripForm').reset();
});
</script>
